<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/splitsync-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SplitSync — Split expenses, settle debts, and stay friends. The modern expense splitting app with multi-currency support, AI receipt scanning, and smart debt simplification." />
    <meta name="theme-color" content="#0a0a1a" />
    <title>SplitSync — Split Expenses</title>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML += '<div style="color:red;font-size:24px;z-index:9999;position:fixed;top:0;left:0;background:#fff;padding:20px;">ERROR: ' + e.message + ' at ' + e.filename + ':' + e.lineno + '</div>';
      });
      console.error = function(...args) {
        document.body.innerHTML += '<div style="color:red;font-size:24px;z-index:9999;position:fixed;top:100px;left:0;background:#fff;padding:20px;">CONSOLE ERROR: ' + args.join(' ') + '</div>';
      };
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Loading screen shown during hard refresh before React hydrates -->
      <div id="app-loader" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;width:100%;background:#f7f8fa;font-family:'Plus Jakarta Sans',sans-serif;">
        <img src="/splitsync-icon.png" alt="SplitSync" style="width:80px;height:80px;margin-bottom:20px;animation:loaderPulse 1.5s ease-in-out infinite;border-radius:16px;" />
        <div style="font-family:'Clash Display',sans-serif;font-size:24px;font-weight:700;color:#1c1c28;margin-bottom:8px;">SplitSync</div>
        <div style="font-size:13px;color:#8a8fa8;letter-spacing:0.02em;">Loading your finances...</div>
        <div style="margin-top:24px;width:40px;height:40px;border:3px solid #e8eaed;border-top-color:#3dba5f;border-radius:50%;animation:loaderSpin 0.8s linear infinite;"></div>
      </div>
      <style>
        @keyframes loaderSpin { to { transform: rotate(360deg); } }
        @keyframes loaderPulse { 0%,100% { transform: scale(1); opacity:1; } 50% { transform: scale(1.08); opacity:0.85; } }
      </style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
